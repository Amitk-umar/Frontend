<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Css</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-black">
    <h1 class="text-white text-6xl font-bold">Hello tailwindcss , My Name is
      Amit kumar 🧑🏻‍💻</h1>

    <div
      class="flex p-[.5px] bg-gradient-to-b from-white/50 rounded-2xl to-transparent mt-5 mb-10 sm:mb-10"><a
        class="text-white text-center group text-xl md:text-xl font-bold py-3 sm:py-4 px-8 sm:px-10 rounded-2xl outline-none hover:shadow-[0_0px_40px_5px_rgba(232,96,46,0.5)] transition-all duration-300 text-xl"
        href="/courses" data-discover="true"
        style="background: linear-gradient(96.76deg, rgb(232, 96, 46) 5.3%, rgb(52, 14, 0) 234.66%) right center / 150% 100% border-box padding-box, border-box; transition: background-position 300ms, box-shadow 300ms;"><div
          class="relative overflow-hidden w-max cursor-pointer mx-auto">

          <div
            class="transition-transform duration-300 ease-out group-hover:-translate-y-full">Start
            Journey <span>→</span>
          </div>

          <div
            class="absolute inset-0 translate-y-full transition-transform duration-300 ease-out group-hover:translate-y-0 ">Start
            Journey <span>→</span>
          </div>
        </div>
      </a>

    </div>

  </body>
</html>
