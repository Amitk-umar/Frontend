<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables</title>
  </head>

  <body style="font-family: cursive">
    <h1>Welcome in Html Tables</h1>




    <table border="3">


        <caption>Fruits Price...</caption>
        <colgroup>
            <col style="background-color: rgba(255, 141, 100, 0.795);">
            <col style="background-color: burlywood;">
            <col style="background: rgba(54, 234, 54, 0.621);">
        </colgroup>

      <thead>
        <tr>
          <th>Fruit Name</th>
          <th>Quantity</th>
          <th>Price</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>Mango</td>
          <td>30</td>
          <td>3600 (₹120/kg)</td>
        </tr>
        <tr>
          <td>DragonFruit</td>
          <td>20</td>
          <td>20000 (₹1000/kg)</td>
        </tr>

        <tr>
          <td>StarFruit</td>
          <td>25</td>
          <td>5000 (₹200/kg)</td>
        </tr>

        <tr>
          <td>Guava</td>
          <td>35</td>
          <td>1750 (₹50/kg)</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <th colspan="2">Total Price :</th>
          <th>30,350</th>
        </tr>
      </tfoot>

    </table>
  </body>
</html>
