<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic tags in html</title>
  </head>
  <body>
    <header>
      <h1>This is my navbar</h1>
    </header>

    <main>

      <section>
        <form action=""></form>
      </section>

      <aside>
        <h3>sidebar/side tabs</h3>
      </aside>

      <article>
        <h3>this is my new article on save tree</h3>
      </article>

    </main>

    <footer>
      <h4>this is my footer</h4>
    </footer>
    
  </body>
</html>
